<!-- Q. 버튼을 클릭하면 1~3000까지의 숫자 리스트가 화면에 출력되게 해보자. (반복문 사용) -->

<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM 실습</title>
  </head>
  <body>
    <button onClick="onClick()">리스트 추가하기</button>
    <ul id="ul"></ul>
  </body>

  <script>
    // 실행될 때마다 기존 HTML 내용을 전부 읽어온 뒤 새 내용을 더해 통째로 다시 렌더링 > DOM 접근 횟수 3000번.
		// const onClick = () => {
    //   const ul = document.getElementById('ul');

    //   for(let i =1; i<=3000; i++) {
    //     ul.innerHTML += `<li>${i}</li>`;
    //   }
    // };

      const onClick = () => {
        const ul = document.getElementById('ul');
        let list = '';

        for (let i = 1; i <= 3000; i++) {
          list += `<li>${i}</li>`;
        }

      ul.innerHTML = list; // 마지막에 한 번만 실행 > DOM 접근 1회 !
    };

  </script>
</html>
